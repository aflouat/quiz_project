{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Quiz - Questions</h2>
        <p>Total de questions : {{ total_questions }}</p>
        
        <form method="post" action="{% url 'quiz' %}">
            {% csrf_token %}
            
            {% for question in questions %}
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>{{ question.question_text }}</h5>
                    </div>
                    <div class="card-body">
                        {% for choice in question.choices.all %}
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="question_{{ question.id }}" 
                                       id="choice_{{ choice.id }}" value="{{ choice.id }}">
                                <label class="form-check-label" for="choice_{{ choice.id }}">
                                    {{ choice.choice_text }}
                                </label>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-success btn-lg">Soumettre le Quiz</button>
        </form>
    </div>
</div>
{% endblock %}
